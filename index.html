<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Kamera Diagnose</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
        }
        h1 { color: #ff9f0a; }
        .container { max-width: 600px; margin: 0 auto; }
        .btn {
            background-color: #ff9f0a;
            color: black;
            font-weight: bold;
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        #video-container {
            margin: 15px auto;
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        /* Das Diagnose-Fenster */
        #debug-console {
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 10px;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            color: #30d158;
            margin-top: 20px;
        }
        .log-error { color: #ff453a; }
        .log-info { color: #0a84ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kamera Diagnose</h1>
    
    <div style="margin: 10px 0;">
        <button class="btn" onclick="startCameraSender()">1. Kamera starten</button>
        <button class="btn" style="background-color: #0a84ff; color: white;" onclick="connectAsReceiver()">2. Als Empfänger verbinden</button>
    </div>

    <div id="video-container">
        <button id="play-btn" class="btn" style="position:absolute; display:none;" onclick="forcePlay()">▶ Video abspielen</button>
        <video id="remote-video" autoplay playsinline muted></video>
    </div>

    <h3>System-Protokoll (Fehlersuche):</h3>
    <div id="debug-console"></div>
</div>

<script>
    // Einzigartiger Raumname (Ändere das, falls du Verbindungen von Fremden verhindern willst)
    const RAUM_ID = "ipad-direct-cam-test-2026"; 

    const consoleDiv = document.getElementById('debug-console');
    const videoElement = document.getElementById('remote-video');
    const playBtn = document.getElementById('play-btn');
    let peer = null;
    let localStream = null;

    // Eigene Log-Funktion, die Text auf dem iPad-Bildschirm anzeigt
    function log(message, type = 'info') {
        const p = document.createElement('div');
        p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        if (type === 'error') p.className = 'log-error';
        if (type === 'info') p.className = 'log-info';
        consoleDiv.appendChild(p);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // Prüfen, ob wir auf HTTPS sind
    if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
        log("WARNUNG: Du nutzt kein HTTPS! iOS blockiert die Kamera ohne HTTPS komplett!", "error");
    } else {
        log("Protokoll OK (HTTPS/Localhost erkannt).");
    }

    // SENDER STARTEN (iPad 1)
    async function startCameraSender() {
        log("Starte Sender-Modus...");
        try {
            log("Fordere Kamera-Rechte an...");
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            log("Kamera erfolgreich gestartet!", "info");
        } catch (e) {
            log("Kamera-Fehler: " + e.message, "error");
            return;
        }

        log("Verbinde mit PeerJS-Server...");
        peer = new Peer(RAUM_ID + "-sender");

        peer.on('open', (id) => {
            log("Erfolgreich als SENDER registriert! ID: " + id);
        });

        peer.on('call', (call) => {
            log("Anruf von Empfänger erhalten! Sende Video-Stream...", "info");
            call.answer(localStream);
        });

        peer.on('error', (err) => {
            log("PeerJS Fehler: " + err.type, "error");
        });
    }

    // EMPFÄNGER STARTEN (iPad 2)
    function connectAsReceiver() {
        log("Starte Empfänger-Modus...");
        peer = new Peer();

        peer.on('open', (id) => {
            log("Empfänger bereit. Rufe Sender an...");
            // Wir rufen den Sender an
            const call = peer.call(RAUM_ID + "-sender", new MediaStream());

            call.on('stream', (remoteStream) => {
                log("Video-Stream erhalten! Versuche darzustellen...", "info");
                videoElement.srcObject = remoteStream;
                videoElement.style.display = "block";
                playBtn.style.display = "block"; // Zeige iOS Startknopf
            });

            call.on('error', (err) => {
                log("Verbindungsfehler im Call: " + err.message, "error");
            });
        });

        peer.on('error', (err) => {
            log("Empfänger PeerJS Fehler: " + err.type, "error");
        });
    }

    function forcePlay() {
        log("Sende Play-Befehl an das Video...");
        videoElement.play()
            .then(() => {
                log("Video spielt erfolgreich ab!", "info");
                playBtn.style.display = "none";
            })
            .catch(err => {
                log("iOS verweigert Abspielen: " + err.message, "error");
            });
    }
</script>

</body>
</html>
