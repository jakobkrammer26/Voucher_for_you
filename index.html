<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-iPad Kamera</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
        }
        h1 { color: #30d158; }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .btn {
            background-color: #30d158;
            color: black;
            font-weight: bold;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #24a142; }
        .btn-secondary { background-color: #3a3a3c; color: white; }
        
        #video-container {
            margin-top: 20px;
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            background: #000;
            margin-left: auto;
            margin-right: auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s ease;
            display: none; /* Erst anzeigen, wenn der Stream aktiv ist */
        }
        .status {
            font-size: 1.1em;
            color: #aeaeb2;
            margin: 15px 0;
            padding: 10px;
            background: #1c1c1e;
            border-radius: 8px;
            display: inline-block;
        }
        .controls { margin-top: 15px; }
        input[type="range"] { width: 80%; max-width: 300px; }
        
        /* Einblendbarer Button, um die iOS-Autoplay Sperre aufzuheben */
        #play-overlay-btn {
            position: absolute;
            z-index: 10;
            display: none;
            padding: 15px 25px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Automatische iPad-Kamera</h1>
    
    <div class="status" id="status-text">Initialisiere Netzwerk...</div>
    
    <div class="controls">
        <button class="btn btn-secondary" onclick="switchCamera()">Kamera wechseln (Front/Back)</button>
    </div>

    <div id="video-container">
        <button id="play-overlay-btn" class="btn" onclick="forcePlayVideo()">▶ Stream aktivieren</button>
        <video id="remote-video" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <p>Zoom (Regler oder mit zwei Fingern pitchen):</p>
        <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1" oninput="applyZoom(this.value)">
    </div>
</div>

<script>
    const GEMEINSAMER_RAUM = "mein-privates-ipad-netzwerk-9921"; 

    let peer;
    let localStream = null;
    let currentFacingMode = "environment"; 
    let currentZoom = 1;

    const statusText = document.getElementById('status-text');
    const videoElement = document.getElementById('remote-video');
    const playBtn = document.getElementById('play-overlay-btn');

    function initConnection() {
        peer = new Peer(GEMEINSAMER_RAUM + "-sender");

        peer.on('open', (id) => {
            statusText.innerText = "Bereit! Dieses iPad ist SENDER 1. Öffne nun das andere iPad.";
            startCameraSender();
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                statusText.innerText = "Sender gefunden! Verbinde als Empfänger...";
                connectAsReceiver();
            } else {
                statusText.innerText = "Fehler: " + err.type;
            }
        });
    }

    // --- SENDER ROLLE ---
    async function startCameraSender() {
        peer.on('call', async (call) => {
            statusText.innerText = "Empfänger verbunden! Kamera wird übertragen...";
            const stream = await getCameraStream();
            if (stream) {
                call.answer(stream);
            }
        });
    }

    async function getCameraStream() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            });
            return localStream;
        } catch (err) {
            statusText.innerText = "Kamerazugriff fehlgeschlagen: " + err.message;
        }
    }

    // --- EMPFÄNGER ROLLE ---
    function connectAsReceiver() {
        peer = new Peer();

        peer.on('open', () => {
            const call = peer.call(GEMEINSAMER_RAUM + "-sender", new MediaStream());
            statusText.innerText = "Verbindung wird aufgebaut...";

            call.on('stream', (remoteStream) => {
                statusText.innerText = "Verbindung hergestellt! Klicke auf den Button zum Abspielen.";
                
                videoElement.srcObject = remoteStream;
                videoElement.style.display = "block";
                
                // Zeige den iOS-Freigabe-Button an
                playBtn.style.display = "block";
            });
        });
    }

    // iOS-spezifische Freigabe durch echte Benutzerinteraktion
    function forcePlayVideo() {
        videoElement.play().then(() => {
            statusText.innerText = "Live-Stream aktiv!";
            playBtn.style.display = "none"; // Button ausblenden, wenn das Video läuft
        }).catch(err => {
            statusText.innerText = "Abspielfehler: " + err.message;
        });
    }

    // Kamera umschalten
    async function switchCamera() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        await getCameraStream();
        statusText.innerText = "Kamera gewechselt! Bitte lade den Empfänger neu.";
    }

    // Zoom-Logik (CSS-Skalierung)
    function applyZoom(value) {
        currentZoom = value;
        videoElement.style.transform = `scale(${value})`;
    }

    // Pinch-to-Zoom Geste
    const videoContainer = document.getElementById('video-container');
    let initialDist = 0;

    videoContainer.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    });

    videoContainer.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDist > 0) {
            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            let factor = dist / initialDist;
            let newZoom = Math.min(Math.max(currentZoom * factor, 1), 4);
            
            document.getElementById('zoom-slider').value = newZoom;
            applyZoom(newZoom);
            initialDist = dist;
        }
    });

    videoContainer.addEventListener('touchend', () => { initialDist = 0; });

    window.onload = initConnection;
</script>

</body>
</html>
