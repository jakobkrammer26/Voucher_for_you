<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calliope Bluetooth Control</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c1b 0%, #201335 100%);
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            color: #00f3ff;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
        }

        .subtitle {
            color: #a19da9;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .control-panel {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .name-input-container {
            margin-bottom: 15px;
        }

        .name-input-container input {
            font-size: 16px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-weight: bold;
            text-align: center;
            width: 60%;
        }

        button {
            font-size: 16px;
            font-weight: 700;
            padding: 16px 32px;
            margin: 12px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-connect {
            background: linear-gradient(45deg, #00ff87 0%, #60efff 100%);
            color: #000;
            font-size: 18px;
            padding: 20px 40px;
            box-shadow: 0 0 30px rgba(0, 255, 135, 0.4);
        }

        .btn-forward {
            background: linear-gradient(45deg, #0055ff 0%, #00ff87 100%);
            color: white;
            width: calc(100% - 24px);
        }

        .btn-blink {
            background: #222;
            color: white;
            border: 1px solid #0055ff;
        }

        .btn-reverse {
            background: #ff9800;
            color: black;
        }

        .btn-ellen-follow {
            background: linear-gradient(45deg, #ff007f 0%, #7f00ff 100%);
            color: white;
            flex: 1;
        }

        .btn-ellen-warn {
            background: linear-gradient(45deg, #ff5722 0%, #ff9800 100%);
            color: white;
            flex: 1;
        }

        .btn-stop {
            background: #f44336;
            color: white;
            width: 60%;
            margin-top: 30px;
        }

        .section {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        h3 {
            margin-top: 0;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 2px;
            color: #a19da9;
            text-align: left;
            border-left: 3px solid #ff007f;
            padding-left: 10px;
        }

        #status {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #ff3b30;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calliope Matrix</h1>
        <div class="subtitle">Bluetooth Funk-Steuerung (Auto-Scan &amp; Zahlen)</div>

        <button id="connectBtn" class="btn-connect">🔵 Per Bluetooth verbinden</button>

        <div id="panel" class="control-panel">
            <div class="section">
                <h3>📢 Voice Trigger</h3>
                <div class="name-input-container">
                    <input type="text" id="targetName" value="Ellen">
                </div>
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button id="ellenFollowBtn" class="btn-ellen-follow">🏃‍♀️ Rufen</button>
                    <button id="ellenWarnBtn" class="btn-ellen-warn">⚠️ Vorsicht</button>
                </div>
            </div>

            <div class="section">
                <h3>🚘 Licht &amp; Fahr-Befehle</h3>
                <button id="forwardBtn" class="btn-forward">🚀 Vorwärts (4)</button>
                <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
                    <button id="leftBtn" class="btn-blink">⬅️ Links (1)</button>
                    <button id="rightBtn" class="btn-blink">Rechts ➡️ (2)</button>
                </div>
                <button id="reverseBtn" class="btn-reverse" style="width: calc(100% - 24px);">⚠️ Rückwärts (3)</button>
            </div>

            <button id="stopBtn" class="btn-stop">❌ STOPP (0)</button>
        </div>

        <div id="status">STATUS: Bluetooth getrennt</div>
    </div>

    <script>
        let txCharacteristic;
        let signalInterval;
        let aktuellerModus = "0";

        const connectBtn = document.getElementById('connectBtn');
        const panel = document.getElementById('panel');
        const statusDiv = document.getElementById('status');
        const targetNameInput = document.getElementById('targetName');

        function laptopSprich(text) {
            window.speechSynthesis.cancel(); 
            let satz = new SpeechSynthesisUtterance(text);
            satz.lang = 'de-DE';
            window.speechSynthesis.speak(satz);
        }

        connectBtn.addEventListener('click', async () => {
            try {
                statusDiv.innerText = "Scanne alle Geräte...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '6e400001-b5a3-f393-e0a9-e50e24dcca9e', // UART Service UUID
                        'e95d93af-251d-470a-a062-fa1922dfa9a8'
                    ]
                });

                statusDiv.innerText = "Verbinde mit Gerät...";
                const server = await device.gatt.connect();
                
                statusDiv.innerText = "Suche verfügbare Dienste...";
                const services = await server.getPrimaryServices();
                
                // Durchsuche alle gefundenen Dienste nach einem Kanal zum Schreiben
                for (let service of services) {
                    const characteristics = await service.getCharacteristics();
                    for (let char of characteristics) {
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            txCharacteristic = char;
                            break;
                        }
                    }
                    if (txCharacteristic) break;
                }

                if (!txCharacteristic) {
                    throw new Error("Kein passender Schreib-Kanal auf dem Calliope gefunden.");
                }

                statusDiv.innerText = "STATUS: Über Bluetooth verbunden!";
                statusDiv.style.color = "#00ff87";
                panel.style.display = "block";
                connectBtn.style.display = "none";
                laptopSprich("Funkverbindung aktiv.");
            } catch (error) {
                statusDiv.innerText = "Fehler: " + error.message;
                statusDiv.style.color = "#f44336";
            }
        });

        async function sendeBefehl(text) {
            if (txCharacteristic) {
                try {
                    let encoder = new TextEncoder();
                    await txCharacteristic.writeValue(encoder.encode(text + '\n'));
                } catch (e) {
                    console.log("Sende-Fehler:", e);
                }
            }
        }

        function starteSignal(modusZahl) {
            if (signalInterval) clearInterval(signalInterval);
            aktuellerModus = modusZahl;
            let statusAn = false;

            signalInterval = setInterval(async () => {
                if (statusAn) {
                    await sendeBefehl(aktuellerModus);
                } else {
                    await sendeBefehl("0");
                }
                statusAn = !statusAn;
            }, 350);
        }

        document.getElementById('forwardBtn').addEventListener('click', () => starteSignal("4"));
        document.getElementById('leftBtn').addEventListener('click', () => starteSignal("1"));
        document.getElementById('rightBtn').addEventListener('click', () => starteSignal("2"));
        document.getElementById('reverseBtn').addEventListener('click', () => starteSignal("3"));

        document.getElementById('ellenFollowBtn').addEventListener('click', () => {
            laptopSprich(`${targetNameInput.value.trim() || "Ellen"}, folge mir!`);
        });

        document.getElementById('ellenWarnBtn').addEventListener('click', () => {
            laptopSprich(`Vorsicht ${targetNameInput.value.trim() || "Ellen"}, pass auf!`);
        });

        document.getElementById('stopBtn').addEventListener('click', async () => {
            if (signalInterval) clearInterval(signalInterval);
            await sendeBefehl("0");
            statusDiv.innerText = "STATUS: Standby";
            laptopSprich("Stopp.");
        });
    </script>
</body>
</html>
