<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad CamShare Ultimate Cockpit</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            justify-content: space-between;
        }
        h1 { color: #30d158; font-size: 20px; margin: 5px 0; }
        
        .status-box {
            background: #1c1c1e;
            padding: 6px;
            border-radius: 10px;
            font-size: 11px;
            margin-bottom: 5px;
            border: 1px solid #2c2c2e;
        }

        /* Buttons im iOS-Look */
        .btn-row {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }
        .btn {
            background-color: #30d158;
            color: black;
            font-weight: bold;
            border: none;
            padding: 10px;
            font-size: 13px;
            border-radius: 10px;
            cursor: pointer;
            flex: 1;
            transition: opacity 0.1s;
        }
        .btn:active { opacity: 0.7; }
        .btn-blue { background-color: #0a84ff; color: white; }
        .btn-red { background-color: #ff453a; color: white; }
        .btn-gray { background-color: #2c2c2e; color: white; }
        .btn-orange { background-color: #ff9f0a; color: black; }
        .btn-purple { background-color: #af52de; color: white; }
        
        /* Video-Bereich */
        #viewports {
            position: relative;
            flex-grow: 1;
            background: #121212;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2c2c2e;
        }
        
        /* Großes Empfänger-Video */
        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform-origin: center;
            transition: transform 0.2s ease, filter 0.1s ease;
        }

        /* Kleines lokales Vorschaufenster (Bild-in-Bild) */
        #local-video {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 90px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ffffff;
            z-index: 10;
            background: #000;
        }

        /* Schwarzer Vorhang für Energiesparmodus am Sender */
        #saver-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .controls {
            padding: 5px 0;
            background: #000;
        }
        
        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 4px;
        }

        .slider-box {
            margin-top: 6px;
            background: #1c1c1e;
            padding: 6px;
            border-radius: 10px;
            font-size: 11px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 4px 0;
        }
        input[type="range"] {
            width: 70%;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="header-area">
        <h1 id="app-title">iPad CamShare Ultimate</h1>
        <div class="status-box" id="status">Schritt 1: Stream-Qualität wählen & Kamera aktivieren</div>
    </div>

    <div id="viewports">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        
        <div id="saver-overlay">
            <div style="font-size: 12px; color: #1c1c1e; cursor: pointer;" onclick="toggleLocalSaver()">⚙️</div>
        </div>
    </div>

    <div class="controls" id="controls-area">
        <div class="btn-row" id="setup-buttons">
            <select id="quality-select" style="background:#2c2c2e; color:white; border-radius:10px; padding:10px; border:none; margin-right:5px; font-weight:bold;">
                <option value="hd">HD (720p)</option>
                <option value="sd">SD (360p)</option>
            </select>
            <button class="btn" id="btn-cam" onclick="initLocalCamera()">1. Starten</button>
            <button class="btn btn-blue" id="btn-connect" onclick="startConnection()" disabled style="opacity: 0.4;">2. Koppeln</button>
        </div>
        
        <div id="receiver-dashboard" style="display: none;">
            <div class="btn-row">
                <button class="btn btn-gray" style="background-color: #545456;" onclick="takePhoto()">📸 Foto</button>
                <button class="btn btn-red" id="btn-record" onclick="toggleRecording()">🔴 Aufnahme</button>
                <button class="btn btn-purple" id="btn-mute-self" onclick="toggleLocalMute()">🔊 Mein Mikro: An</button>
            </div>
            
            <div class="control-grid">
                <button class="btn btn-gray" onclick="rotateVideo()">🔄 90° Drehen</button>
                <button class="btn btn-gray" onclick="mirrorVideo()">🪞 Spiegeln</button>
                <button class="btn btn-orange" onclick="requestRemoteCameraSwitch()">📷 Cam drüben</button>
            </div>

            <div class="control-grid" style="margin-top: 4px;">
                <button class="btn btn-gray" onclick="requestRemoteTorch()"><span id="torch-status">💡</span> Licht drüben</button>
                <button class="btn btn-gray" onclick="requestRemoteSaver()">📱 Monitor drüben aus</button>
                <button class="btn btn-gray" onclick="toggleFullscreen()">📺 Vollbild</button>
            </div>
            
            <div class="slider-box">
                <div class="slider-row">
                    <span>Zoom:</span>
                    <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1" oninput="applyZoom(this.value)">
                </div>
                <div class="slider-row">
                    <span>Belichtung:</span>
                    <input type="range" id="brightness-slider" min="50" max="200" step="5" value="100" oninput="applyBrightness(this.value)">
                </div>
            </div>
        </div>
    </div>
</div>

<canvas id="capture-canvas" style="display: none;"></canvas>

<script>
    const ZUFALLS_ID = Math.floor(1000 + Math.random() * 9000);
    const RAUM_ID = "ipad-rtc-" + ZUFALLS_ID;

    const statusDiv = document.getElementById('status');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');
    const btnCam = document.getElementById('btn-cam');
    const btnConnect = document.getElementById('btn-connect');
    const btnRecord = document.getElementById('btn-record');
    const zoomSlider = document.getElementById('zoom-slider');
    const brightnessSlider = document.getElementById('brightness-slider');
    const captureCanvas = document.getElementById('capture-canvas');
    const controlsArea = document.getElementById('controls-area');
    const setupButtons = document.getElementById('setup-buttons');
    const receiverDashboard = document.getElementById('receiver-dashboard');
    const saverOverlay = document.getElementById('saver-overlay');
    const qualitySelect = document.getElementById('quality-select');

    let peer = null;
    let localStream = null;
    let remoteStreamObject = null; 
    let currentCall = null;
    let dataConnection = null; 
    let currentFacingMode = "environment"; 
    let torchActive = false;
    let myMicrophoneMuted = false;

    // Aufnahme-Variablen
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    // Transformationen
    let currentZoom = 1;
    let currentRotation = 0; 
    let isMirrored = false;
    let currentBrightness = 100;

    // 1. Kamera und Mikrofon starten
    async function initLocalCamera() {
        const quality = qualitySelect.value;
        const videoWidth = quality === 'hd' ? 1280 : 640;
        const videoHeight = quality === 'hd' ? 720 : 360;

        try {
            statusDiv.innerText = "Verbindung mit Kamera & Mikrofon...";
            localStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: videoWidth },
                    height: { ideal: videoHeight }
                },
                audio: true 
            });
            
            localVideo.srcObject = localStream;
            btnCam.style.display = "none";
            qualitySelect.style.display = "none";
            btnConnect.disabled = false;
            btnConnect.style.opacity = "1";
            
            initPeer();
        } catch (err) {
            statusDiv.innerText = "Fehler: " + err.message;
        }
    }

    // 2. PeerJS initialisieren
    function initPeer() {
        peer = new Peer(RAUM_ID);

        peer.on('open', (id) => {
            statusDiv.innerHTML = `Bereit! Code: <b style="color:#30d158; font-size:16px;">${ZUFALLS_ID}</b><br>Trage diese ID auf dem Empfänger-iPad ein.`;
        });

        peer.on('call', (call) => {
            transformToSenderMode();
            currentCall = call;
            call.answer(localStream);
            
            call.on('stream', (incomingStream) => {
                showRemoteStream(incomingStream);
            });
        });

        peer.on('connection', (conn) => {
            dataConnection = conn;
            setupDataListener();
        });
    }

    // 3. Verbindung herstellen
    function startConnection() {
        const zielCode = prompt("Gib den 4-stelligen Code des Kamera-iPads ein:");
        if (!zielCode) return;

        const zielID = "ipad-rtc-" + zielCode.trim();
        statusDiv.innerText = "Verbinde mit Sender...";

        dataConnection = peer.connect(zielID);
        setupDataListener();

        currentCall = peer.call(zielID, localStream);
        currentCall.on('stream', (incomingStream) => {
            transformToReceiverMode();
            showRemoteStream(incomingStream);
        });
    }

    // Schaltet das Sender-iPad in den passiven Modus
    function transformToSenderMode() {
        setupButtons.style.display = "none";
        controlsArea.style.display = "none"; 
        localVideo.style.width = "100%"; 
        localVideo.style.height = "100%";
        localVideo.style.right = "0";
        localVideo.style.bottom = "0";
        localVideo.style.borderRadius = "0";
        localVideo.style.border = "none";
        statusDiv.innerHTML = "🔴 <b>Live-Übertragung läuft.</b> (Das iPad wird ferngesteuert)";
    }

    // Schaltet das Empfänger-iPad in das Kontrollzentrum
    function transformToReceiverMode() {
        setupButtons.style.display = "none";
        receiverDashboard.style.display = "block"; 
        localVideo.style.display = "none"; 
    }

    // Empfängt Befehle auf dem Sender-iPad
    function setupDataListener() {
        dataConnection.on('data', async (data) => {
            if (data === 'switch-camera') {
                await switchCamera();
            }
            if (data === 'toggle-torch') {
                toggleLocalTorch();
            }
            if (data === 'toggle-saver') {
                toggleLocalSaver();
            }
        });
    }

    // Remote-Befehle vom Empfänger senden
    function requestRemoteCameraSwitch() {
        if (dataConnection && dataConnection.open) {
            dataConnection.send('switch-camera');
            statusDiv.innerText = "Kamera drüben wird gewechselt...";
        }
    }

    function requestRemoteTorch() {
        if (dataConnection && dataConnection.open) {
            dataConnection.send('toggle-torch');
            torchActive = !torchActive;
            document.getElementById('torch-status').innerText = torchActive ? "🟡" : "💡";
            statusDiv.innerText = torchActive ? "Licht drüben eingeschaltet" : "Licht drüben ausgeschaltet";
        }
    }

    function requestRemoteSaver() {
        if (dataConnection && dataConnection.open) {
            dataConnection.send('toggle-saver');
            statusDiv.innerText = "Standby-Befehl gesendet...";
        }
    }

    // Lokaler Bildschirmschoner (schwarzer Bildschirm)
    function toggleLocalSaver() {
        if (saverOverlay.style.display === "flex") {
            saverOverlay.style.display = "none";
        } else {
            saverOverlay.style.display = "flex";
        }
    }

    // Taschenlampe ansteuern
    async function toggleLocalTorch() {
        if (!localStream) return;
        const videoTrack = localStream.getVideoTracks()[0];
        try {
            const capabilities = videoTrack.getCapabilities();
            if (capabilities.torch) {
                const constraints = videoTrack.getConstraints();
                const currentTorchState = constraints.advanced && constraints.advanced[0] && constraints.advanced[0].torch;
                await videoTrack.applyConstraints({
                    advanced: [{ torch: !currentTorchState }]
                });
            }
        } catch (err) {
            console.log("Fehler Taschenlampe: " + err.message);
        }
    }

    // Eigenes Mikrofon stummschalten (Gegensprech-Funktion)
    function toggleLocalMute() {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            myMicrophoneMuted = !myMicrophoneMuted;
            audioTrack.enabled = !myMicrophoneMuted;
            const btn = document.getElementById('btn-mute-self');
            btn.innerText = myMicrophoneMuted ? "🔇 Mein Mikro: Aus" : "🔊 Mein Mikro: An";
            btn.style.backgroundColor = myMicrophoneMuted ? "#545456" : "#af52de";
        }
    }

    // Stream abspielen
    function showRemoteStream(stream) {
        remoteStreamObject = stream;
        remoteVideo.srcObject = stream;
        remoteVideo.muted = false; 
        
        statusDiv.innerText = "Verbunden! Live-Kanal aktiv.";
        remoteVideo.style.display = "block";
        
        remoteVideo.play().catch(() => {
            statusDiv.innerText = "Tippe auf den Bildschirm für Ton & Bild!";
            remoteVideo.onclick = () => {
                remoteVideo.muted = false; 
                remoteVideo.play();
                statusDiv.innerText = "Verbunden! Live-Kanal aktiv.";
            };
        });
    }

    // Kamera umschalten
    async function switchCamera() {
        if (!localStream) return;
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";

        try {
            const quality = qualitySelect.value;
            const videoWidth = quality === 'hd' ? 1280 : 640;
            const videoHeight = quality === 'hd' ? 720 : 360;

            const newStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode, width: { ideal: videoWidth }, height: { ideal: videoHeight } },
                audio: true
            });

            const newTrack = newStream.getVideoTracks()[0];
            localVideo.srcObject = newStream;

            if (currentCall && currentCall.peerConnection) {
                const senders = currentCall.peerConnection.getSenders();
                const videoSender = senders.find(sender => sender.track && sender.track.kind === 'video');
                if (videoSender) {
                    videoSender.replaceTrack(newTrack);
                }
            }

            localStream.getTracks().forEach(track => track.stop());
            localStream = newStream;
        } catch (err) {
            statusDiv.innerText = "Fehler beim Kamerawechsel: " + err.message;
        }
    }

    // Foto machen
    function takePhoto() {
        const video = remoteVideo.srcObject ? remoteVideo : localVideo;
        if (!video.srcObject) return;

        captureCanvas.width = video.videoWidth;
        captureCanvas.height = video.videoHeight;
        const ctx = captureCanvas.getContext('2d');

        ctx.translate(captureCanvas.width / 2, captureCanvas.height / 2);
        if (isMirrored) ctx.scale(-1, 1);
        ctx.rotate((currentRotation * Math.PI) / 180);
        
        // CSS Belichtung auf dem Foto anwenden
        ctx.filter = `brightness(${currentBrightness}%)`;
        
        ctx.drawImage(video, -captureCanvas.width / 2, -captureCanvas.height / 2, captureCanvas.width, captureCanvas.height);

        const dataURL = captureCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `Foto_${Date.now()}.png`;
        link.href = dataURL;
        link.click();
        statusDiv.innerText = "Foto gespeichert!";
    }

    // Video aufnehmen
    function toggleRecording() {
        const streamToRecord = remoteStreamObject || localStream;
        if (!streamToRecord) return;

        if (!isRecording) {
            recordedChunks = [];
            let options = { mimeType: 'video/mp4' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }

            try {
                mediaRecorder = new MediaRecorder(streamToRecord, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(streamToRecord);
            }

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `Video_${Date.now()}.mp4`;
                link.href = url;
                link.click();
                statusDiv.innerText = "Aufnahme gespeichert!";
            };

            mediaRecorder.start();
            isRecording = true;
            btnRecord.innerText = "⏹ Stoppen";
            btnRecord.style.backgroundColor = "#ff3b30";
            statusDiv.innerText = "🔴 Aufnahme läuft...";
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btnRecord.innerText = "🔴 Aufnahme";
            btnRecord.style.backgroundColor = "#ff453a";
        }
    }

    // Transformationen
    function rotateVideo() {
        currentRotation = (currentRotation + 90) % 360;
        updateVideoTransform();
    }

    function mirrorVideo() {
        isMirrored = !isMirrored;
        updateVideoTransform();
    }

    function applyBrightness(value) {
        currentBrightness = value;
        remoteVideo.style.filter = `brightness(${value}%)`;
    }

    function updateVideoTransform() {
        const mirrorScale = isMirrored ? -1 : 1;
        remoteVideo.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg) scaleX(${mirrorScale})`;
    }

    function applyZoom(value) {
        currentZoom = value;
        updateVideoTransform();
    }

    // Vollbild
    function toggleFullscreen() {
        const header = document.getElementById('header-area');
        const controls = document.getElementById('controls-area');
        
        if (header.style.display !== "none") {
            header.style.display = "none";
            controls.style.display = "none";
            statusDiv.innerText = "";
            
            viewports.onclick = () => {
                header.style.display = "block";
                controls.style.display = "block";
                viewports.onclick = null;
            };
        }
    }

    // Pinch-To-Zoom
    let initialDist = 0;
    viewports.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    });

    viewports.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDist > 0) {
            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            let factor = dist / initialDist;
            let newZoom = Math.min(Math.max(currentZoom * factor, 1), 4);
            
            zoomSlider.value = newZoom;
            applyZoom(newZoom);
            initialDist = dist;
        }
    });

    viewports.addEventListener('touchend', () => { initialDist = 0; });
</script>

</body>
</html>
