<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Kamera Stream</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
        }
        h1 { color: #0a84ff; }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .btn {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #3a3a3c; }
        
        #video-container {
            margin-top: 20px;
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            background: #000;
            margin-left: auto;
            margin-right: auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s ease;
        }
        .controls {
            margin-top: 15px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #3a3a3c;
            background: #2c2c2e;
            color: white;
            width: 200px;
            text-align: center;
        }
        .status {
            color: #aeaeb2;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>iPad CamShare</h1>
    
    <div class="status">Deine ID: <strong id="my-id">Wird geladen...</strong></div>
    
    <div>
        <input type="text" id="peer-id-input" placeholder="ID des anderen iPads eingeben">
        <button class="btn" onclick="connectToPeer()">Kamera anfordern</button>
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="switchCamera()">Kamera wechseln (Front/Back)</button>
    </div>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <p>Zoom-Steuerung (Schieberegler oder mit zwei Fingern auf dem Video pitchen):</p>
        <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1" oninput="applyZoom(this.value)">
    </div>
</div>

<script>
    let peer;
    let localStream = null;
    let currentFacingMode = "environment"; // Startet standardmäßig mit der Rückkamera ("environment") oder "user" (Front)
    let currentZoom = 1;

    // 1. PeerJS initialisieren
    // Erzeugt eine zufällige ID für dieses iPad
    peer = new Peer();

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
    });

    // 2. Kamera-Stream holen
    async function getCameraStream() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        try {
            // Holt Video-Berechtigung vom iPad
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode },
                audio: false
            });
            return localStream;
        } catch (err) {
            alert("Fehler beim Zugriff auf die Kamera: " + err.message);
        }
    }

    // 3. Eingehenden Anruf (Stream-Anforderung) beantworten
    peer.on('call', async (call) => {
        const stream = await getCameraStream();
        if (stream) {
            call.answer(stream); // Sendet den eigenen Kamera-Stream zurück
        }
    });

    // 4. Verbindung zum anderen iPad aufbauen (Stream anfordern)
    async function connectToPeer() {
        const otherId = document.getElementById('peer-id-input').value.trim();
        if (!otherId) {
            alert("Bitte gib die ID des anderen iPads ein!");
            return;
        }

        // Wir rufen das andere iPad an (wir senden einen leeren Stream, um dessen Stream zu triggern)
        const call = peer.call(otherId, new MediaStream());
        
        call.on('stream', (remoteStream) => {
            // Empfangenen Stream im Video-Element anzeigen
            const videoElement = document.getElementById('remote-video');
            videoElement.srcObject = remoteStream;
        });
    }

    // 5. Kamera wechseln (Front / Rückseite)
    async function switchCamera() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        await getCameraStream();
        alert("Kamera gewechselt! Wenn du streamst, verbinde dich bitte neu, um das Bild zu aktualisieren.");
    }

    // 6. Zoom-Funktion (Simuliert über CSS-Transform für maximale Kompatibilität)
    function applyZoom(value) {
        currentZoom = value;
        const video = document.getElementById('remote-video');
        video.style.transform = `scale(${value})`;
    }

    // Pinch-to-Zoom Geste auf dem Video-Container für iPads hinzufügen
    const videoContainer = document.getElementById('video-container');
    let initialDist = 0;

    videoContainer.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    });

    videoContainer.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDist > 0) {
            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            let factor = dist / initialDist;
            let newZoom = Math.min(Math.max(currentZoom * factor, 1), 4);
            
            document.getElementById('zoom-slider').value = newZoom;
            applyZoom(newZoom);
            initialDist = dist; // Basiswert aktualisieren
        }
    });

    videoContainer.addEventListener('touchend', () => {
        initialDist = 0;
    });
</script>

</body>
</html>
