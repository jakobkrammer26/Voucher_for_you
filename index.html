<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad CamShare Final</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
        }
        h1 { color: #30d158; font-size: 24px; margin: 10px 0 5px 0; }
        .status-box {
            background: #1c1c1e;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 10px;
            border: 1px solid #2c2c2e;
        }
        .btn {
            background-color: #30d158;
            color: black;
            font-weight: bold;
            border: none;
            padding: 14px 20px;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn-blue { background-color: #0a84ff; color: white; }
        
        #viewports {
            position: relative;
            flex-grow: 1;
            background: #121212;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2c2c2e;
        }
        
        /* Großes Empfänger-Video */
        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center;
            transition: transform 0.1s ease-out;
        }

        /* Kleines lokales Vorschaufenster (Bild-in-Bild) */
        #local-video {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 110px;
            height: 145px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ffffff;
            z-index: 10;
            background: #000;
        }

        .controls {
            padding: 15px 0;
            background: #000;
        }
        input[type="range"] {
            width: 90%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h1>iPad CamShare</h1>
        <div class="status-box" id="status">Klicke zuerst auf "Kamera aktivieren"</div>
    </div>

    <div id="viewports">
        <video id="remote-video" autoplay playsinline muted></video>
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button class="btn" id="btn-cam" onclick="initLocalCamera()">1. Kamera aktivieren</button>
        <button class="btn btn-blue" id="btn-connect" onclick="startConnection()" disabled style="opacity: 0.5;">2. Koppeln (Anderes iPad rufen)</button>
        
        <div style="margin-top: 10px;">
            <span style="font-size: 13px; color: #aeaeb2;">Zoom:</span><br>
            <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1" oninput="applyZoom(this.value)">
        </div>
    </div>
</div>

<script>
    const ZUFALLS_ID = Math.floor(1000 + Math.random() * 9000);
    const RAUM_ID = "ipad-rtc-" + ZUFALLS_ID;

    const statusDiv = document.getElementById('status');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');
    const btnCam = document.getElementById('btn-cam');
    const btnConnect = document.getElementById('btn-connect');
    const zoomSlider = document.getElementById('zoom-slider');

    let peer = null;
    let localStream = null;
    let currentZoom = 1;

    // 1. Lokale Kamera auf JEDEM iPad sofort starten
    async function initLocalCamera() {
        try {
            statusDiv.innerText = "Kamera wird gestartet...";
            localStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "environment", // Rückkamera
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            });
            
            localVideo.srcObject = localStream;
            btnCam.style.display = "none";
            btnConnect.disabled = false;
            btnConnect.style.opacity = "1";
            
            // PeerJS Server initialisieren
            initPeer();
        } catch (err) {
            statusDiv.innerText = "Fehler: Kamerazugriff verweigert (" + err.message + ")";
        }
    }

    // 2. Peer initialisieren und für eingehende Verbindungen bereitmachen
    function initPeer() {
        peer = new Peer(RAUM_ID);

        peer.on('open', (id) => {
            statusDiv.innerHTML = `Bereit! Code dieses iPads: <b style="color:#30d158; font-size:16px;">${ZUFALLS_ID}</b><br>Gib diesen Code auf dem anderen iPad ein.`;
        });

        // Falls uns das andere iPad anruft
        peer.on('call', (call) => {
            statusDiv.innerText = "Verbindung wird hergestellt...";
            call.answer(localStream); // Sende unseren Kamera-Stream zurück
            
            call.on('stream', (remoteStream) => {
                showRemoteStream(remoteStream);
            });
        });

        peer.on('error', (err) => {
            statusDiv.innerText = "Verbindungs-Fehler: " + err.type;
        });
    }

    // 3. Verbindung zum anderen iPad aktiv herstellen
    function startConnection() {
        const zielCode = prompt("Gib den 4-stelligen Code des anderen iPads ein:");
        if (!zielCode) return;

        const zielID = "ipad-rtc-" + zielCode.trim();
        statusDiv.innerText = "Rufe anderes iPad ab...";

        // Wir rufen an und senden direkt unser Videosignal mit (wichtig für iOS!)
        const call = peer.call(zielID, localStream);

        call.on('stream', (remoteStream) => {
            showRemoteStream(remoteStream);
        });

        call.on('error', (err) => {
            statusDiv.innerText = "Kopplungs-Fehler: " + err.message;
        });
    }

    // 4. Stream anzeigen (inklusive Force-Play gegen die iOS Blockade)
    function showRemoteStream(stream) {
        remoteVideo.srcObject = stream;
        statusDiv.innerText = "Verbunden! Live-Stream läuft.";
        
        // Erzwinge die Wiedergabe
        remoteVideo.play().catch(e => {
            statusDiv.innerText = "Tippe auf das Bild zum Abspielen!";
            remoteVideo.onclick = () => {
                remoteVideo.play();
                statusDiv.innerText = "Verbunden! Live-Stream läuft.";
            };
        });
    }

    // 5. Zoom-Steuerung
    function applyZoom(value) {
        currentZoom = value;
        remoteVideo.style.transform = `scale(${value})`;
    }

    // Pinch-To-Zoom mit zwei Fingern auf dem großen Videobild
    const viewports = document.getElementById('viewports');
    let initialDist = 0;

    viewports.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    });

    viewports.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDist > 0) {
            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            let factor = dist / initialDist;
            let newZoom = Math.min(Math.max(currentZoom * factor, 1), 4);
            
            zoomSlider.value = newZoom;
            applyZoom(newZoom);
            initialDist = dist;
        }
    });

    viewports.addEventListener('touchend', () => { initialDist = 0; });
</script>

</body>
</html>
