<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad CamShare Pro Max (Audio-Update)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            justify-content: space-between;
        }
        h1 { color: #30d158; font-size: 22px; margin: 5px 0; }
        
        .status-box {
            background: #1c1c1e;
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 5px;
            border: 1px solid #2c2c2e;
        }

        /* Buttons im iOS-Look */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 5px;
        }
        .btn {
            background-color: #30d158;
            color: black;
            font-weight: bold;
            border: none;
            padding: 12px;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            flex: 1;
            transition: opacity 0.1s;
        }
        .btn:active { opacity: 0.7; }
        .btn-blue { background-color: #0a84ff; color: white; }
        .btn-red { background-color: #ff453a; color: white; }
        .btn-gray { background-color: #2c2c2e; color: white; }
        .btn-orange { background-color: #ff9f0a; color: black; }
        
        /* Video-Bereich */
        #viewports {
            position: relative;
            flex-grow: 1;
            background: #121212;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2c2c2e;
        }
        
        /* Großes Empfänger-Video */
        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform-origin: center;
            transition: transform 0.2s ease;
        }

        /* Kleines lokales Vorschaufenster (Bild-in-Bild) */
        #local-video {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 90px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ffffff;
            z-index: 10;
            background: #000;
        }

        .controls {
            padding: 10px 0;
            background: #000;
        }
        
        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 5px;
        }

        .slider-box {
            margin-top: 8px;
            background: #1c1c1e;
            padding: 8px;
            border-radius: 10px;
        }
        input[type="range"] {
            width: 85%;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="header-area">
        <h1 id="app-title">iPad CamShare Cockpit</h1>
        <div class="status-box" id="status">Schritt 1: Kamera & Mikrofon aktivieren</div>
    </div>

    <div id="viewports">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div class="controls" id="controls-area">
        <div class="btn-row" id="setup-buttons">
            <button class="btn" id="btn-cam" onclick="initLocalCamera()">1. Kamera & Mikro aktivieren</button>
            <button class="btn btn-blue" id="btn-connect" onclick="startConnection()" disabled style="opacity: 0.4;">2. Koppeln</button>
        </div>
        
        <div id="receiver-dashboard" style="display: none;">
            <div class="btn-row">
                <button class="btn btn-gray" style="background-color: #545456;" onclick="takePhoto()">📸 Foto machen</button>
                <button class="btn btn-red" id="btn-record" onclick="toggleRecording()">🔴 Aufnahme starten</button>
            </div>
            
            <div class="control-grid">
                <button class="btn btn-gray" onclick="rotateVideo()">🔄 Drehen (90°)</button>
                <button class="btn btn-gray" onclick="mirrorVideo()">🪞 Spiegeln</button>
                <button class="btn btn-orange" onclick="requestRemoteCameraSwitch()">📷 Cam drüben wechseln</button>
            </div>

            <div class="control-grid" style="margin-top: 5px;">
                <button class="btn btn-gray" onclick="requestRemoteTorch()"><span id="torch-status">💡</span> Licht drüben</button>
                <button class="btn btn-gray" style="grid-column: span 2;" onclick="toggleFullscreen()">📺 Vollbild-Modus</button>
            </div>
            
            <div class="slider-box">
                <span style="font-size: 12px; color: #aeaeb2;">Zoom:</span><br>
                <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1" oninput="applyZoom(this.value)">
            </div>
        </div>
    </div>
</div>

<canvas id="capture-canvas" style="display: none;"></canvas>

<script>
    const ZUFALLS_ID = Math.floor(1000 + Math.random() * 9000);
    const RAUM_ID = "ipad-rtc-" + ZUFALLS_ID;

    const statusDiv = document.getElementById('status');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');
    const btnCam = document.getElementById('btn-cam');
    const btnConnect = document.getElementById('btn-connect');
    const btnRecord = document.getElementById('btn-record');
    const zoomSlider = document.getElementById('zoom-slider');
    const captureCanvas = document.getElementById('capture-canvas');
    const controlsArea = document.getElementById('controls-area');
    const setupButtons = document.getElementById('setup-buttons');
    const receiverDashboard = document.getElementById('receiver-dashboard');

    let peer = null;
    let localStream = null;
    let remoteStreamObject = null; 
    let currentCall = null;
    let dataConnection = null; 
    let currentFacingMode = "environment"; 
    let torchActive = false;

    // Aufnahme-Variablen
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    // Transformationen
    let currentZoom = 1;
    let currentRotation = 0; 
    let isMirrored = false;

    // 1. Kamera und MIKROFON auf dem iPad starten
    async function initLocalCamera() {
        try {
            statusDiv.innerText = "Kamera & Mikrofon werden gestartet...";
            localStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: true // Hier ist Audio aktiviert
            });
            
            localVideo.srcObject = localStream;
            btnCam.style.display = "none";
            btnConnect.disabled = false;
            btnConnect.style.opacity = "1";
            
            initPeer();
        } catch (err) {
            statusDiv.innerText = "Rechte verweigert: " + err.message;
        }
    }

    // 2. PeerJS-Verbindung empfangen
    function initPeer() {
        peer = new Peer(RAUM_ID);

        peer.on('open', (id) => {
            statusDiv.innerHTML = `Bereit! Code dieses iPads: <b style="color:#30d158; font-size:16px;">${ZUFALLS_ID}</b><br>Gib diesen auf dem Empfänger-iPad ein.`;
        });

        peer.on('call', (call) => {
            // SENDER-MODUS: Kamera-iPad wird stummgeschaltet und passiv
            transformToSenderMode();
            
            currentCall = call;
            call.answer(localStream); // Antwortet mit Bild & Ton
            
            call.on('stream', (incomingStream) => {
                showRemoteStream(incomingStream);
            });
        });

        peer.on('connection', (conn) => {
            dataConnection = conn;
            setupDataListener();
        });
    }

    // 3. Aktiv mit dem Kamera-iPad verbinden
    function startConnection() {
        const zielCode = prompt("Gib den 4-stelligen Code des Kamera-iPads ein:");
        if (!zielCode) return;

        const zielID = "ipad-rtc-" + zielCode.trim();
        statusDiv.innerText = "Verbinde mit Kamera...";

        // Steuerkanal aufbauen
        dataConnection = peer.connect(zielID);
        setupDataListener();

        // Audio- und Video-Call starten
        currentCall = peer.call(zielID, localStream);
        currentCall.on('stream', (incomingStream) => {
            transformToReceiverMode();
            showRemoteStream(incomingStream);
        });
    }

    // Wandelt das filmende iPad in ein passives Auge um
    function transformToSenderMode() {
        setupButtons.style.display = "none";
        controlsArea.style.display = "none"; 
        localVideo.style.width = "100%"; 
        localVideo.style.height = "100%";
        localVideo.style.right = "0";
        localVideo.style.bottom = "0";
        localVideo.style.borderRadius = "0";
        localVideo.style.border = "none";
        statusDiv.innerHTML = "🔴 <b>Dieses iPad überträgt live (Bild & Ton).</b>";
    }

    // Aktiviert das Dashboard auf dem Empfänger-iPad
    function transformToReceiverMode() {
        setupButtons.style.display = "none";
        receiverDashboard.style.display = "block"; 
        localVideo.style.display = "none"; 
    }

    // Empfängt die Fernsteuerungssignale auf dem Sender
    function setupDataListener() {
        dataConnection.on('data', async (data) => {
            if (data === 'switch-camera') {
                await switchCamera();
            }
            if (data === 'toggle-torch') {
                toggleLocalTorch();
            }
        });
    }

    // Fernsteuerungs-Befehle senden
    function requestRemoteCameraSwitch() {
        if (dataConnection && dataConnection.open) {
            dataConnection.send('switch-camera');
            statusDiv.innerText = "Kamera drüben wird gewechselt...";
        }
    }

    function requestRemoteTorch() {
        if (dataConnection && dataConnection.open) {
            dataConnection.send('toggle-torch');
            torchActive = !torchActive;
            document.getElementById('torch-status').innerText = torchActive ? "🟡" : "💡";
            statusDiv.innerText = torchActive ? "Licht drüben an" : "Licht drüben aus";
        }
    }

    // Lokales Licht schalten (nur falls Hardware es unterstützt)
    async function toggleLocalTorch() {
        if (!localStream) return;
        const videoTrack = localStream.getVideoTracks()[0];
        try {
            const capabilities = videoTrack.getCapabilities();
            if (capabilities.torch) {
                const constraints = videoTrack.getConstraints();
                const currentTorchState = constraints.advanced && constraints.advanced[0] && constraints.advanced[0].torch;
                await videoTrack.applyConstraints({
                    advanced: [{ torch: !currentTorchState }]
                });
            }
        } catch (err) {
            console.log("Fehler Taschenlampe: " + err.message);
        }
    }

    // Zeigt den Videostream mit Ton an
    function showRemoteStream(stream) {
        remoteStreamObject = stream;
        remoteVideo.srcObject = stream;
        
        // Ton auf dem Empfänger aktivieren (darf nicht stumm sein!)
        remoteVideo.muted = false; 
        
        statusDiv.innerText = "Verbunden! Stream und Audio aktiv.";
        remoteVideo.style.display = "block";
        
        // iOS-Sperre umgehen
        remoteVideo.play().catch(() => {
            statusDiv.innerText = "Tippe auf den Bildschirm für Bild & Ton!";
            remoteVideo.onclick = () => {
                remoteVideo.muted = false; 
                remoteVideo.play();
                statusDiv.innerText = "Verbunden! Stream und Audio aktiv.";
            };
        });
    }

    // Kamera wechseln
    async function switchCamera() {
        if (!localStream) return;
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";

        try {
            const newStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: true
            });

            const newTrack = newStream.getVideoTracks()[0];
            localVideo.srcObject = newStream;

            if (currentCall && currentCall.peerConnection) {
                const senders = currentCall.peerConnection.getSenders();
                const videoSender = senders.find(sender => sender.track && sender.track.kind === 'video');
                if (videoSender) {
                    videoSender.replaceTrack(newTrack);
                }
            }

            localStream.getTracks().forEach(track => track.stop());
            localStream = newStream;
        } catch (err) {
            statusDiv.innerText = "Kamera-Wechsel-Fehler: " + err.message;
        }
    }

    // --- FOTO AUFNEHMEN ---
    function takePhoto() {
        const video = remoteVideo.srcObject ? remoteVideo : localVideo;
        if (!video.srcObject) return;

        captureCanvas.width = video.videoWidth;
        captureCanvas.height = video.videoHeight;
        const ctx = captureCanvas.getContext('2d');

        ctx.translate(captureCanvas.width / 2, captureCanvas.height / 2);
        if (isMirrored) ctx.scale(-1, 1);
        ctx.rotate((currentRotation * Math.PI) / 180);
        ctx.drawImage(video, -captureCanvas.width / 2, -captureCanvas.height / 2, captureCanvas.width, captureCanvas.height);

        const dataURL = captureCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `Foto_${Date.now()}.png`;
        link.href = dataURL;
        link.click();
        statusDiv.innerText = "Foto auf diesem Gerät gespeichert!";
    }

    // --- VIDEO AUFZEICHNEN (inklusive Ton) ---
    function toggleRecording() {
        const streamToRecord = remoteStreamObject || localStream;
        if (!streamToRecord) return;

        if (!isRecording) {
            recordedChunks = [];
            let options = { mimeType: 'video/mp4' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }

            try {
                mediaRecorder = new MediaRecorder(streamToRecord, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(streamToRecord);
            }

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `Video_${Date.now()}.mp4`;
                link.href = url;
                link.click();
                statusDiv.innerText = "Aufnahme auf diesem Gerät gespeichert!";
            };

            mediaRecorder.start();
            isRecording = true;
            btnRecord.innerText = "⏹ Aufnahme stoppen";
            btnRecord.style.backgroundColor = "#ff3b30";
            statusDiv.innerText = "🔴 Video- & Tonaufnahme läuft...";
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btnRecord.innerText = "🔴 Aufnahme starten";
            btnRecord.style.backgroundColor = "#ff453a";
        }
    }

    // --- TRANSFORMATIONEN ---
    function rotateVideo() {
        currentRotation = (currentRotation + 90) % 360;
        updateVideoTransform();
    }

    function mirrorVideo() {
        isMirrored = !isMirrored;
        updateVideoTransform();
    }

    function updateVideoTransform() {
        const mirrorScale = isMirrored ? -1 : 1;
        remoteVideo.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg) scaleX(${mirrorScale})`;
    }

    function applyZoom(value) {
        currentZoom = value;
        updateVideoTransform();
    }

    // Vollbild-Modus
    function toggleFullscreen() {
        const header = document.getElementById('header-area');
        const controls = document.getElementById('controls-area');
        
        if (header.style.display !== "none") {
            header.style.display = "none";
            controls.style.display = "none";
            statusDiv.innerText = "";
            
            viewports.onclick = () => {
                header.style.display = "block";
                controls.style.display = "block";
                viewports.onclick = null;
            };
        }
    }

    // Pinch-To-Zoom Gestensteuerung
    let initialDist = 0;
    viewports.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    });

    viewports.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDist > 0) {
            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            let factor = dist / initialDist;
            let newZoom = Math.min(Math.max(currentZoom * factor, 1), 4);
            
            zoomSlider.value = newZoom;
            applyZoom(newZoom);
            initialDist = dist;
        }
    });

    viewports.addEventListener('touchend', () => { initialDist = 0; });
</script>

</body>
</html>
